        - img "Raised, vegetated mound at the base of the ruined Templecurraheen church wall, set apart from the marked graves around it." [ref=e30] [cursor=pointer]
        - generic [ref=e31]:
          - heading "The Famine Plot at Templecurraheen" [level=3] [ref=e32]
          - paragraph [ref=e33]: Walk into the old graveyard at Templecurraheen and stand near the ruined medieval church. If you look toward the back, you will see a distinct shift in the ground — a large, irregular mound, set apart from the surrounding headstones, with no names, dates, or markers. Local tradition holds that beneath it lie the bones of famine victims from the parish.
          - paragraph [ref=e34]: The mound is inside the graveyard wall, raised and vegetated, bare of headstones while the marked stones around it crowd up close but do not encroach. The church ruin rises directly behind it. No register known to me lists who is buried there, and no inscription marks the ground. The identification rests on what has been passed down in the parish.
          - paragraph [ref=e35]: It is easy to walk past the mound without noticing it. But once you know it is there, the small patch of ground holds what the inscriptions around it cannot.
      - generic [ref=e36]:
        - img "Myrtle tree in Templecurraheen Graveyard" [ref=e38] [cursor=pointer]
        - generic [ref=e39]:
          - heading "Myrtle tree" [level=3] [ref=e40]
          - paragraph [ref=e41]: Found in graveyards due to their symbolism of love, immortality and remembrance. The myrtle is evergreen symbolising immortality and the continuation of life beyond physical death. This aligns with the idea of remembering and honouring the deceased.
